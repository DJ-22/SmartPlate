<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartPlate</title>
<style>
  :root{
    --bg:#0a0c12;--surface:#13161f;--surface2:#1a1d2a;--border:#252838;
    --accent:#7c6ff7;--accent-glow:rgba(124,111,247,.25);
    --text:#e8eaf0;--muted:#636880;--green:#56d18a;--red:#f07070;--yellow:#f0c060;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
  .orb1{width:400px;height:400px;background:#7c6ff7;top:-100px;left:-100px}
  .orb2{width:300px;height:300px;background:#56d18a;bottom:-80px;right:-80px}
  .orb3{width:200px;height:200px;background:#f0c060;top:50%;left:60%}
  .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}
  .logo{text-align:center;margin-bottom:36px}
  .logo-icon{font-size:40px;margin-bottom:10px}
  .logo h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .logo h1 span{color:var(--accent)}
  .logo p{color:var(--muted);font-size:14px;margin-top:4px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em}
  .field input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:.2s}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;letter-spacing:.02em}
  .btn:hover{background:#6a5ee8;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .err{color:var(--red);font-size:13px;margin-top:12px;text-align:center;min-height:18px}
  .loading{display:none;text-align:center;color:var(--muted);font-size:13px;margin-top:12px}
  .dots span{animation:blink 1.2s infinite;opacity:0}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
  .role-badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:24px}
  .rbadge{padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--muted)}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🍽</div>
    <h1>Smart<span>Plate</span></h1>
    <p>Restaurant Management System</p>
  </div>

  <div class="card">
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <input id="email" type="email" placeholder="you@restaurant.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="err" id="err"></div>
    <div class="loading" id="loading">Signing in<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>

  <div class="role-badges">
    <span class="rbadge">Customer</span>
    <span class="rbadge">Chef</span>
    <span class="rbadge">Employee</span>
    <span class="rbadge">Supplier</span>
    <span class="rbadge">Manager</span>
  </div>
</div>

<script>
const API = (window.SMARTPLATE_API || 'http://localhost:8000') + '/api/v1';
const ROLE_PAGES = {
  customer: 'customer-dashboard.html',
  chef:     'chef-dashboard.html',
  employee: 'employee-dashboard.html',
  supplier: 'supplier-dashboard.html',
  manager:  'manager-dashboard.html',
};

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('err');
  const loadEl   = document.getElementById('loading');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }

  document.querySelector('.btn').disabled = true;
  loadEl.style.display = 'block';

  try {
    const res  = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) { errEl.textContent = data.detail || 'Invalid credentials'; return; }

    const page = ROLE_PAGES[data.role];
    if (!page) { errEl.textContent = 'Unknown role: ' + data.role; return; }

    // Store token + metadata for dashboard to pick up
    sessionStorage.setItem('sp_token',       data.token);
    sessionStorage.setItem('sp_role',        data.role);
    sessionStorage.setItem('sp_supplier_id', data.supplier_id || 0);

    window.location.href = page;
  } catch (e) {
    errEl.textContent = 'Cannot reach server. Is the backend running?';
  } finally {
    document.querySelector('.btn').disabled = false;
    loadEl.style.display = 'none';
  }
}
</script>
</body>
</html>
